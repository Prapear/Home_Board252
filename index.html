};

// ── UTILS ─────────────────────────────────────────────────────────────────────
const ls={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const tdStr=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const fmtD=s=>{const[y,m,d]=s.split('-').map(Number);return`${d} ${MTH[m-1]} ${y+543}`;};
const nowHHMM=()=>{const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
const useNotifications=(wakeups,shop,pushToast)=>{
  const timers=useRef({});
  const notifPerm=useRef(typeof Notification!=='undefined'?Notification.permission:'denied');
  const requestPerm=useCallback(async()=>{
    if(typeof Notification==='undefined')return false;
    const p=await Notification.requestPermission();notifPerm.current=p;return p==='granted';
  },[]);
  const fire=useCallback((title,body,tag)=>{
    pushToast({title,body,id:tag+Date.now()});
    if(notifPerm.current==='granted'){try{new Notification(title,{body,tag});}catch{}}
  },[pushToast]);
  const scheduleWake=useCallback((call)=>{
    const key=`wake_${call.id}`;if(timers.current[key])return;
    const now=new Date(),[h,m]=call.time.split(':').map(Number);
    const tgt=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0),delay=tgt-now;
    if(delay<=0)return;
    const tm=gM(call.target),bm=gM(call.by);
    timers.current[key]=setTimeout(()=>{fire(`⏰ ปลุก${tm?.name}! (${call.time})`,`${bm?.name} ฝากปลุกไว้`,key);delete timers.current[key];},delay);
  },[fire]);
  useEffect(()=>{const td=tdStr();wakeups.filter(c=>c.date===td).forEach(scheduleWake);},[wakeups,scheduleWake]);
  useEffect(()=>{
    const k='shop_17',pending=shop.filter(i=>!i.done);
    if(timers.current[k])clearTimeout(timers.current[k]);
    if(!pending.length)return;
    const now=new Date(),dow=now.getDay();if(dow===0||dow===6)return;
    const tgt=new Date(now.getFullYear(),now.getMonth(),now.getDate(),17,0,0),delay=tgt-now;
    if(delay<=0)return;
    timers.current[k]=setTimeout(()=>{fire('🛒 อย่าลืมซื้อของ!',`มีของรอซื้อ ${pending.length} รายการ`,k);delete timers.current[k];},delay);
  },[shop,fire]);
  useEffect(()=>()=>{Object.values(timers.current).forEach(clearTimeout);},[]);
  return{requestPerm};
};

      <div key={t.id} className="toast-in rounded-2xl px-4 py-3 shadow-lg pointer-events-auto flex items-start gap-3"
           style={{background:'#1C1917',maxWidth:'420px',margin:'0 auto',width:'100%'}}>
        <div className="flex-1 min-w-0">
          <p className="text-sm font-bold text-amber-100 leading-tight">{t.title}</p>
          <p className="text-xs text-amber-400 mt-0.5">{t.body}</p>
        </div>

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
const Nav=({page,go,admin})=>{

// ── SYNC STATUS DOT ───────────────────────────────────────────────────────────
const SyncDot=({status,onSync})=>{
  const cfg={idle:{c:'#10B981',lb:'ซิงค์แล้ว'},syncing:{c:'#F59E0B',lb:'กำลังซิงค์…'},error:{c:'#EF4444',lb:'timeout กด retry'},local:{c:'#9CA3AF',lb:'Local mode'}};
  const s=cfg[status]||cfg.idle;
  return(<button onClick={onSync} className="flex items-center gap-1 text-xs px-2 py-1 rounded-full" style={{background:'#FAF7F2',border:'1px solid #E8DCC8'}}>
    <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:s.c,boxShadow:status==='syncing'?`0 0 6px ${s.c}`:''}}/>
    <span style={{color:s.c,fontSize:'10px'}}>{s.lb}</span>
    <ISync sz={11} cl="text-amber-400"/>
  </button>);
};

// ── NOTIF BANNER ──────────────────────────────────────────────────────────────
const NotifBanner=({requestPerm})=>{
  const [st,setSt]=useState(()=>typeof Notification!=='undefined'?Notification.permission:'unsupported');
  if(st==='granted'||st==='unsupported')return null;
  const ask=async()=>{const p=await requestPerm();if(p)setSt('granted');};
  return(<div className="mb-4 p-3 rounded-2xl flex items-center gap-3" style={{background:'#FEF3C7',border:'1px solid #FDE68A'}}>
    <IBell sz={18} cl="text-amber-600 flex-shrink-0"/>
    <p className="text-xs text-amber-800 flex-1">เปิด Notification เพื่อรับแจ้งเตือน</p>
    <button onClick={ask} className="text-xs font-bold text-white px-3 py-1.5 rounded-xl" style={{background:'#B45309'}}>เปิด</button>
  </div>);
};

// ── WHO'S HOME ────────────────────────────────────────────────────────────────
const WhosHome=({sched,user,setUser})=>{
  const td=tdStr(),day=sched[td]||{};
  const isHome=mid=>{const s=day[mid];if(!s)return true;const m=gM(mid);return m?.isNurse?(s==='off'||s==='home'):(s==='home');};
  return(<div className="wood rounded-2xl p-4 mb-4">
    <div className="flex items-center mb-4 gap-2"><CatIcon sz={26}/><h2 className="font-bold text-amber-900 text-base">Who's Home Now?</h2><span className="ml-auto text-xs text-amber-400">{fmtD(td)}</span></div>
    <div className="grid grid-cols-2 gap-3">
      {MEMBERS.map(m=>{
        const sid=day[m.id],sh=sid?gS(m.id,sid):null,home=isHome(m.id),me=user===m.id;

// ── MONTHLY SUMMARY ───────────────────────────────────────────────────────────
const MonthSummary=({sched,yr,mo})=>{
  const pfx=`${yr}-${String(mo+1).padStart(2,'0')}`;
  const dim=new Date(yr,mo+1,0).getDate();
  const holC=Object.keys(HOLS).filter(k=>{const[hy,hm]=k.split('-').map(Number);return hy===yr&&hm===mo+1;}).length;
  const wkC=[...Array(dim)].filter((_,i)=>{const d=new Date(yr,mo,i+1).getDay();return d===0||d===6;}).length;
  const counts={};MEMBERS.forEach(m=>{counts[m.id]={};});

// ── APPS SCRIPT GUIDE ────────────────────────────────────────────────────────
const SCRIPT_CODE=`const SHEET_NAME = 'HomeBoard';
const EMAIL_TO   = 'chanana.1827@gmail.com';

function doGet(e) {
  const sheet = SpreadsheetApp
    .getActiveSpreadsheet()
    .getSheetByName(SHEET_NAME);
  const raw = sheet.getRange('A1').getValue();
  const out = ContentService
    .createTextOutput(raw || '{}')
    .setMimeType(ContentService.MimeType.JSON);
  return out;
}

function doPost(e) {
  const sheet = SpreadsheetApp
    .getActiveSpreadsheet()
    .getSheetByName(SHEET_NAME);

  // โหลด data เดิม
  let prev = {};
  try { prev = JSON.parse(sheet.getRange('A1').getValue() || '{}'); }
  catch(err) {}

  // บันทึก data ใหม่
  const body = e.postData.contents;
  sheet.getRange('A1').setValue(body);

  // ตรวจหา wakeup call ใหม่ → ส่ง email
  try {
    const next = JSON.parse(body);
    const prevIds = new Set((prev.wakeups || []).map(w => String(w.id)));
    const newCalls = (next.wakeups || []).filter(w => !prevIds.has(String(w.id)));
    newCalls.forEach(call => {
      const lines = [
        '🔔 มีการฝากปลุกใหม่!',
        '',
        '⏰ เวลา   : ' + call.time,
        '👤 ปลุก   : ' + call.target,
        '✍️  ฝากโดย : ' + call.by,
        '📝 โน้ต   : ' + (call.msg || '-'),
      ];
      MailApp.sendEmail({
        to: EMAIL_TO,
        subject: '⏰ Wake-up Call ' + call.time + ' → ' + call.target,
        body: lines.join('\\n'),
      });
    });
  } catch(err) {}

  return ContentService
    .createTextOutput(JSON.stringify({ ok: true }))
    .setMimeType(ContentService.MimeType.JSON);
}`;

// ── APP ROOT ──────────────────────────────────────────────────────────────────
const App=()=>{
  const [page,setPage]=useState('dashboard');
  const [user,setUser]=useState(()=>ls.get('hb_user','CHA'));
  const [members,setMembersRaw]=useState(()=>ls.get('hb_members',M_DEFAULT));
  const [sched,setSchedRaw]=useState(()=>ls.get('hb_sched',{}));
  const [shop,setShopRaw]=useState(()=>ls.get('hb_shop',[]));
  const [wakeups,setWakeupsRaw]=useState(()=>ls.get('hb_wake',[]));
  const [notes,setNotesRaw]=useState(()=>ls.get('hb_notes',[]));
  const [toasts,setToasts]=useState([]);
  const [syncStatus,setSyncStatus]=useState('idle');
  const [pinModal,setPinModal]=useState(null);
  const [pinInput,setPinInput]=useState('');
  const [pinErr,setPinErr]=useState(false);

  // Update module-level MEMBERS on every render
  MEMBERS=members;

  // ── Persist ──
  useEffect(()=>ls.set('hb_user',user),[user]);
  useEffect(()=>ls.set('hb_members',members),[members]);
  useEffect(()=>ls.set('hb_sched',sched),[sched]);
  useEffect(()=>ls.set('hb_shop',shop),[shop]);
  useEffect(()=>ls.set('hb_wake',wakeups),[wakeups]);
  useEffect(()=>ls.set('hb_notes',notes),[notes]);

  // ── Sync: fetch on mount ──
  useEffect(()=>{
    setSyncStatus('syncing');
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000); // timeout 8s
    fetch(SHEET_URL+'?t='+Date.now(),{signal:ctrl.signal})
      .then(r=>r.json())
      .then(d=>{
        clearTimeout(timer);
        const remoteTs=d._ts||0, localTs=ls.get('hb_ts',0);
        if(remoteTs>localTs&&(d.sched!==undefined||d.shop!==undefined)){
          if(d.sched!==undefined)  setSchedRaw(d.sched);
          if(d.shop!==undefined)   setShopRaw(d.shop);
          if(d.wakeups!==undefined)setWakeupsRaw(d.wakeups);
          if(d.notes!==undefined)  setNotesRaw(d.notes);
          if(d.members!==undefined)setMembersRaw(d.members);
          ls.set('hb_ts',remoteTs);
        }
        setSyncStatus('idle');
      })
      .catch(err=>{
        clearTimeout(timer);
        // CORS หรือ network error → ใช้ localStorage ต่อไปได้ ไม่แสดง error ให้รกตา
        if(err.name==='AbortError'){setSyncStatus('error');}
        else{setSyncStatus('local');} // local-only mode
      });
    return()=>{ctrl.abort();clearTimeout(timer);};
  },[]);

  // ── Sync: push debounced ──
  const syncPayload=useRef({});
  syncPayload.current={sched,shop,wakeups,notes,members};
  const doSync=useCallback(()=>{
    const ts=Date.now();
    setSyncStatus('syncing');
    // text/plain = simple request ไม่มี preflight, Apps Script รับได้ปกติ
    fetch(SHEET_URL,{
      method:'POST',
      body:JSON.stringify({...syncPayload.current,_ts:ts}),
      headers:{'Content-Type':'text/plain'}
    })
      .then(r=>r.json())
      .then(d=>{
        if(d.ok){ls.set('hb_ts',ts);setSyncStatus('idle');}
        else setSyncStatus('error');
      })
      .catch(()=>setSyncStatus('error'));
  },[]);
  useEffect(()=>{const t=setTimeout(doSync,3000);return()=>clearTimeout(t);},[sched,shop,wakeups,notes,members,doSync]);

  // ── PIN modal ──
  const handleSwitchUser=mid=>{
    if(mid===user)return;
    setPinInput('');setPinErr(false);setPinModal(mid);
  };
  const confirmPin=()=>{
    const m=members.find(x=>x.id===pinModal);
    if(pinInput===m?.pin){setUser(pinModal);setPinModal(null);}
    else setPinErr(true);
  };

  // ── Toast ──
  const pushToast=useCallback(t=>{setToasts(p=>[...p,t]);setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==t.id)),6000);},[]);
  const dismissToast=useCallback(id=>setToasts(p=>p.filter(x=>x.id!==id)),[]);
  const {requestPerm,scheduleWake}=useNotifications(wakeups,shop,pushToast);

  const setSched=useCallback(u=>setSchedRaw(p=>typeof u==='function'?u(p):u),[]);
  const isAdmin=members.find(m=>m.id===user)?.isAdmin||false;

  return(<div style={{fontFamily:"'Sarabun',sans-serif",background:'#FAF7F2',minHeight:'100vh'}}>
    <ToastLayer toasts={toasts} dismiss={dismissToast}/>

    {/* PIN Modal */}
    {pinModal&&(<div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,.4)'}}>
      <div className="wood rounded-2xl p-6 mx-4 w-full max-w-xs slide-up">
        {(()=>{const m=members.find(x=>x.id===pinModal);return(<>
          <div className="text-center mb-4">
            <div className="w-14 h-14 rounded-full flex items-center justify-center font-bold text-lg mx-auto mb-2" style={{background:m?.bg,color:m?.color}}>{m?.name.slice(0,2)}</div>
            <p className="font-bold text-amber-900">ใส่ PIN ของ {m?.name}</p>
          </div>
          <input type="password" inputMode="numeric" maxLength={4} value={pinInput}
            onChange={e=>{setPinInput(e.target.value);setPinErr(false);}}
            onKeyDown={e=>e.key==='Enter'&&confirmPin()}
            className="w-full text-center text-2xl tracking-widest rounded-xl px-3 py-3 border mb-3 outline-none"
            style={{borderColor:pinErr?'#EF4444':'#E8DCC8',background:'#FAF7F2'}} autoFocus placeholder="••••"/>
          {pinErr&&<p className="text-red-400 text-xs text-center mb-3">PIN ไม่ถูกต้อง</p>}
          <div className="flex gap-2">
            <button onClick={()=>setPinModal(null)} className="flex-1 py-3 rounded-xl border border-amber-200 text-amber-500 font-semibold text-sm">ยกเลิก</button>
            <button onClick={confirmPin} className="flex-1 py-3 rounded-xl text-white font-bold text-sm" style={{background:'#B45309'}}>เข้าสู่ระบบ</button>
          </div>
        </>);})()} 
      </div>
    </div>)}

    {/* Header */}
    <div className="sticky top-0 z-30 flex items-center justify-between px-3 py-2 border-b border-amber-200" style={{background:'#FEFCF8'}}>
      <div className="flex items-center gap-2"><CatIcon sz={24}/><span className="text-sm font-black text-amber-800">Home Board</span></div>
      <div className="flex items-center gap-1 flex-wrap justify-end">
        <SyncDot status={syncStatus} onSync={doSync}/>
        <span className="text-xs text-amber-400 ml-1">ฉัน:</span>
        {members.map(m=>(
          <button key={m.id} onClick={()=>handleSwitchUser(m.id)} className="text-xs px-2 py-1 rounded-full font-bold"
                  style={{background:user===m.id?m.acc:'#F3F4F6',color:user===m.id?'#fff':'#9CA3AF'}}>
            {m.name.split(' ')[0]}
          </button>
        ))}
      </div>
    </div>

    {page==='dashboard'&&<Dashboard sched={sched} user={user} setUser={setUser} wakeups={wakeups} setWakeups={setWakeupsRaw} shop={shop} setShop={setShopRaw} notes={notes} setNotes={setNotesRaw} isAdmin={isAdmin} requestPerm={requestPerm} scheduleWake={scheduleWake}/>}
    {page==='calendar'&&<Calendar sched={sched} setSched={setSched} currentUser={user} isAdmin={isAdmin}/>}
    {page==='notes'&&<Notes notes={notes} setNotes={setNotesRaw} user={user}/>}
    {page==='admin'&&isAdmin&&<Admin shop={shop} setShop={setShopRaw} sched={sched} setSched={setSched} wakeups={wakeups} setWakeups={setWakeupsRaw} notes={notes} setNotes={setNotesRaw} members={members} setMembers={setMembersRaw} syncStatus={syncStatus} onSync={doSync}/>}
    <Nav page={page} go={setPage} admin={isAdmin}/>
  </div>);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
