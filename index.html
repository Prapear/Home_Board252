// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
const useNotifications=(wakeups,shop,pushToast)=>{
  const timers=useRef({});
  const notifPerm=useRef(typeof Notification!=='undefined'?Notification.permission:'denied');

  const requestPerm=useCallback(async()=>{
    if(typeof Notification==='undefined')return false;
    const p=await Notification.requestPermission();
    notifPerm.current=p;
    return p==='granted';
  },[]);

  const fire=useCallback((title,body,tag)=>{
    // in-app toast always
    pushToast({title,body,id:tag+Date.now()});
    // browser notif
    if(notifPerm.current==='granted'){
      try{new Notification(title,{body,tag,icon:''});}catch{}
    }
  },[pushToast]);

  const scheduleWake=useCallback((call)=>{
    const key=`wake_${call.id}`;
    if(timers.current[key])return; // already scheduled
    const now=new Date();
    const[h,m]=call.time.split(':').map(Number);
    const tgt=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0);
    const delay=tgt-now;
    if(delay<=0)return;
    const tm=gM(call.target),bm=gM(call.by);
    timers.current[key]=setTimeout(()=>{
      fire(`⏰ ปลุก${tm?.name}! (${call.time})`,`${bm?.name} ฝากปลุกไว้`,key);
      delete timers.current[key];
    },delay);
  },[fire]);

  const scheduleShop=useCallback((items)=>{
    const k='shop_17';
    if(timers.current[k])clearTimeout(timers.current[k]);
    const pending=items.filter(i=>!i.done);
    if(!pending.length)return;
    const now=new Date(),dow=now.getDay();
    if(dow===0||dow===6)return;
    const tgt=new Date(now.getFullYear(),now.getMonth(),now.getDate(),17,0,0);
    const delay=tgt-now;
    if(delay<=0)return;
    timers.current[k]=setTimeout(()=>{
      fire('🛒 อย่าลืมซื้อของ!',`มีของรอซื้อ ${pending.length} รายการ ซื้อก่อนกลับบ้านเลย`,k);
      delete timers.current[k];
    },delay);
  },[fire]);

  // schedule on mount + when data changes
  useEffect(()=>{
    const td=tdStr();
    wakeups.filter(c=>c.date===td).forEach(scheduleWake);
  },[wakeups,scheduleWake]);

  useEffect(()=>{ scheduleShop(shop); },[shop,scheduleShop]);

  // cleanup
  useEffect(()=>()=>{Object.values(timers.current).forEach(clearTimeout);},[]);

  return{requestPerm,notifPerm};
};

// ── WHO'S HOME ────────────────────────────────────────────────────────────────
const WhosHome=({sched,user,setUser})=>{
  const td=tdStr(),day=sched[td]||{};
  const isHome=mid=>{const s=day[mid];if(!s)return true;const m=gM(mid);return m?.isNurse?s==='off':s==='home';};

    <div className="wood rounded-2xl p-4 mb-4">
      <div className="flex items-center mb-4 gap-2">
        <CatIcon sz={26}/>
        <h2 className="font-bold text-amber-900 text-base">Who's Home Now?</h2>
        <span className="ml-auto text-xs text-amber-400">{fmtD(td)}</span>
      </div>
      <div className="grid grid-cols-2 gap-3">
        {M.map(m=>{
          const sid=day[m.id],sh=sid?gS(m.id,sid):null,home=isHome(m.id),me=user===m.id;
          return(
            <button key={m.id} onClick={()=>setUser(m.id)} className="rounded-2xl p-3 text-left relative"
                    style={{background:me?m.bg:'#FEFCF8',border:`2px solid ${me?m.acc:'#E8DCC8'}`}}>
              {me&&<span className="absolute top-2 right-2 text-white px-1.5 py-0.5 rounded-full font-bold" style={{background:m.acc,fontSize:'9px'}}>ฉัน</span>}
              <div className="flex items-center gap-2 mb-2">
                <div className="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm" style={{background:m.bg,color:m.color,border:`2px solid ${m.acc}`}}>{m.name.slice(0,2)}</div>
                <div>
                  <p className="font-bold text-sm leading-tight" style={{color:m.color}}>{m.name}</p>
                  <div className="flex items-center gap-1 mt-0.5">
                    <div className="w-2 h-2 rounded-full" style={{background:home?'#10B981':'#D1D5DB'}}/>
                    <span className="text-xs" style={{color:home?'#065F46':'#9CA3AF'}}>{home?'อยู่บ้าน':'ไม่อยู่'}</span>
                  </div>
                </div>

// ── MONTHLY SUMMARY ───────────────────────────────────────────────────────────
const MonthSummary=({sched,yr,mo})=>{
  const pfx=`${yr}-${String(mo+1).padStart(2,'0')}`;
  const dim=new Date(yr,mo+1,0).getDate();
  const holCount=Object.keys(HOLS).filter(k=>{const[hy,hm]=k.split('-').map(Number);return hy===yr&&hm===mo+1;}).length;
  const weekends=[...Array(dim)].filter((_,i)=>{const d=new Date(yr,mo,i+1).getDay();return d===0||d===6;}).length;
  const counts={};
  M.forEach(m=>{counts[m.id]={};});
  Object.entries(sched).filter(([k])=>k.startsWith(pfx)).forEach(([,day])=>{
    Object.entries(day).forEach(([mid,sid])=>{if(counts[mid])counts[mid][sid]=(counts[mid][sid]||0)+1;});
  });
  const logged=Object.values(counts).some(c=>Object.keys(c).length>0);
  return(
    <div className="wood rounded-2xl p-4 mt-4">
      <div className="flex items-center gap-2 mb-4"><span className="text-xl">📊</span><h3 className="font-bold text-amber-900">สรุปเดือน{MTHF[mo]}</h3></div>
      <div className="grid grid-cols-3 gap-2 mb-4">
        {[{v:dim,lb:'วันทั้งหมด',em:'📅'},{v:holCount,lb:'วันหยุดนักขัตฤกษ์',em:'🎉'},{v:weekends,lb:'เสาร์-อาทิตย์',em:'🌿'}].map(s=>(
          <div key={s.lb} className="rounded-xl p-2.5 text-center" style={{background:'#FEF3C7'}}>
            <div className="text-lg">{s.em}</div>
            <div className="text-2xl font-black text-amber-800">{s.v}</div>
            <div className="text-amber-600 leading-tight mt-0.5" style={{fontSize:'9px'}}>{s.lb}</div>
          </div>
        ))}
      </div>
      {!logged?<p className="text-sm text-amber-300 text-center py-4">ยังไม่มีการลงเวรเดือนนี้ 🐱</p>:(
        <div className="space-y-3">
          {M.map(m=>{
            const c=counts[m.id],shifts=m.isNurse?NS:HS,total=Object.values(c).reduce((a,b)=>a+b,0);
            if(!total)return(
              <div key={m.id} className="rounded-xl p-3 flex items-center gap-3" style={{background:'#F9F5F0'}}>
                <div className="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs" style={{background:m.bg,color:m.color}}>{m.name.slice(0,2)}</div>
                <span className="text-sm font-semibold" style={{color:m.color}}>{m.name}</span>
                <span className="ml-auto text-xs text-amber-300">ยังไม่ได้ลง</span>
              </div>
            );
            return(
              <div key={m.id} className="rounded-xl p-3" style={{background:m.bg}}>
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs" style={{background:'rgba(255,255,255,.6)',color:m.color}}>{m.name.slice(0,2)}</div>
                  <span className="font-bold text-sm" style={{color:m.color}}>{m.name}</span>
                  <span className="ml-auto text-xs font-bold px-2 py-0.5 rounded-full text-white" style={{background:m.acc}}>{total} วัน</span>
                </div>
                <div className="flex flex-wrap gap-1.5 mb-2">
                  {shifts.map(s=>{const cnt=c[s.id]||0;return cnt?<div key={s.id} className="flex items-center gap-1 rounded-lg px-2 py-1" style={{background:'rgba(255,255,255,.65)'}}><span className="text-xs">{s.em}</span><span className="text-xs font-bold" style={{color:s.tc}}>{s.lb}</span><span className="text-xs font-black" style={{color:m.color}}>{cnt}</span></div>:null;})}
                </div>
                <div className="h-2 rounded-full overflow-hidden flex" style={{background:'rgba(255,255,255,.4)'}}>
                  {shifts.map(s=>{const cnt=c[s.id]||0,pct=total?(cnt/total*100):0;return pct>0?<div key={s.id} style={{width:`${pct}%`,background:s.c}}/>:null;})}

          })}

        </div>
        <div className="grid grid-cols-7">
          {cells.map((d,idx)=>{
            if(!d)return<div key={idx} className="min-h-[62px] border-b border-r border-amber-50 bg-amber-50/30"/>;
            const dstr=ds(d),dow=new Date(yr,mo,d).getDay();
            const isHol=!!HOLS[dstr],isTod=dstr===tdStr(),shifts=cellShifts(d);
            return(
              <button key={idx} onClick={()=>setSel(dstr)}
                      className="min-h-[62px] p-1 flex flex-col items-center border-b border-r border-amber-50 hover:bg-amber-100/50 transition-colors"
                      style={{background:isTod?'#FEF3C7':isHol?'#FFF5F5':'#FEFCF8'}}>
                <span className="w-7 h-7 flex items-center justify-center rounded-full text-xs font-bold"
                      style={{background:isTod?'#B45309':'transparent',color:isTod?'#fff':isHol||dow===0?'#DC2626':dow===6?'#2563EB':'#78350F'}}>
                  {d}
                </span>
                {isHol&&<div className="w-1.5 h-1.5 rounded-full mt-0.5" style={{background:'#FCA5A5'}}/>}
                <div className="flex flex-wrap gap-px justify-center mt-0.5">
                  {shifts.map(({m,sid},i)=>{const s=gS(m.id,sid);return<div key={i} className="w-2.5 h-2.5 rounded-full" style={{background:s?.c||m.acc}}/>;} )}
                </div>
              </button>
            );
          })}
        </div>
      </div>
      {monthHols.length>0&&(
        <div className="wood rounded-xl p-4 mb-0">
          <p className="text-xs font-bold text-amber-700 mb-3">📅 วันหยุดเดือน{MTHF[mo]}</p>
          <div className="space-y-2">
            {monthHols.map(([k,v])=><div key={k} className="flex gap-3"><span className="font-bold text-red-400 text-sm min-w-[28px]">{k.split('-')[2]}</span><span className="text-sm text-amber-800">{v}</span></div>)}
          </div>
        </div>
      )}
      <button onClick={()=>setShowSum(v=>!v)} className="w-full mt-4 py-3 rounded-xl flex items-center justify-center gap-2 text-sm font-bold border-2 border-dashed"
              style={{borderColor:'#D4C5A9',color:'#B45309',background:'#FEFCF8'}}>
        📊 {showSum?'ซ่อน':'ดู'}สรุปเดือน{MTHF[mo]}
      </button>
      {showSum&&<MonthSummary sched={sched} yr={yr} mo={mo}/>}
      {sel&&<ShiftModal date={sel} sched={sched} setSched={setSched} onClose={()=>setSel(null)}/>}
    </div>
  );
};

// ── NOTES PAGE ────────────────────────────────────────────────────────────────
const Notes=({notes,setNotes,user})=>{
  const [txt,setTxt]=useState('');
  const add=()=>{if(!txt.trim())return;setNotes(p=>[...p,{id:Date.now(),text:txt.trim(),by:user,date:tdStr()}]);setTxt('');};
  return(
    <div className="px-4 pt-4 pb-28 max-w-lg mx-auto">
      <h1 className="text-2xl font-black text-amber-900 mb-1">📝 โน้ตบ้าน</h1>
      <p className="text-sm text-amber-500 mb-5">ฝากข้อความถึงคนในบ้าน</p>
      <div className="wood rounded-2xl p-4 mb-5">
        <textarea value={txt} onChange={e=>setTxt(e.target.value)} rows={3}
                  placeholder={"กะดึก: อย่าส่งเสียงดังตอนเช้า\nมีข้าวในหม้อ\nมีพัสดุมาส่ง อยู่หน้าบ้าน"}
                  className="w-full rounded-xl px-3 py-3 text-sm border border-amber-200 outline-none resize-none mb-3" style={{background:'#FAF7F2',color:'#92400E'}}/>
        <button onClick={add} disabled={!txt.trim()} className="w-full py-3.5 rounded-xl text-white font-bold" style={{background:txt.trim()?'#B45309':'#D4C5A9'}}>📌 โพสต์โน้ต</button>
      </div>
      <div className="space-y-3">
        {[...notes].reverse().map(n=>{const m=gM(n.by);return(
          <div key={n.id} className="wood rounded-2xl p-4">
            <div className="flex items-center gap-2.5 mb-3">
              <div className="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm" style={{background:m?.bg,color:m?.color}}>{m?.name.slice(0,2)}</div>
              <div><p className="font-bold text-sm" style={{color:m?.color}}>{m?.name}</p><p className="text-xs text-amber-400">{fmtD(n.date)}</p></div>
              <button onClick={()=>setNotes(p=>p.filter(x=>x.id!==n.id))} className="ml-auto text-amber-300 hover:text-red-400 p-1"><ID sz={15}/></button>
            </div>
            <p className="text-sm text-amber-900 leading-relaxed whitespace-pre-wrap">{n.text}</p>
          </div>
        );})}
        {notes.length===0&&<div className="text-center py-16"><CatIcon sz={60}/><p className="text-amber-300 text-sm mt-4">ยังไม่มีโน้ต</p></div>}
      </div>
    </div>
  );
};

// ── ADMIN PAGE ────────────────────────────────────────────────────────────────
const Admin=({shop,setShop,sched,setSched,wakeups,setWakeups,notes,setNotes})=>{
  const [cfm,setCfm]=useState({});
  const stats=[{e:'🛒',lb:'รายการค้าง',v:shop.filter(i=>!i.done).length},{e:'📅',lb:'วันที่ลงเวร',v:Object.keys(sched).length},{e:'⏰',lb:'ฝากปลุกวันนี้',v:wakeups.filter(c=>c.date===tdStr()).length},{e:'📝',lb:'โน้ต',v:notes.length}];
  const acts=[
    {k:'sh',lb:'Reset Shopping List',desc:'ลบรายการซื้อของทั้งหมด',fn:()=>setShop([])},
    {k:'sc',lb:'Reset ตารางเวร',desc:'ลบตารางเวรทั้งหมด ⚠️',fn:()=>setSched({})},
    {k:'wu',lb:'Clear Wake-up Calls',desc:'ลบการฝากปลุกทั้งหมด',fn:()=>setWakeups([])},
    {k:'nt',lb:'Clear โน้ตทั้งหมด',desc:'ลบโน้ตบ้านทั้งหมด',fn:()=>setNotes([])},
  ];
  return(
    <div className="px-4 pt-4 pb-28 max-w-lg mx-auto">
      <h1 className="text-2xl font-black text-amber-900 mb-1">⚙️ Admin Panel</h1>
      <p className="text-sm text-amber-500 mb-5">สำหรับ CHA เท่านั้น 👑</p>
      <div className="grid grid-cols-2 gap-3 mb-5">
        {stats.map(s=><div key={s.lb} className="wood rounded-xl p-3.5 text-center"><div className="text-2xl mb-1">{s.e}</div><div className="text-2xl font-black text-amber-800">{s.v}</div><div className="text-xs text-amber-500 mt-0.5">{s.lb}</div></div>)}
      </div>
      <div className="wood rounded-2xl p-4 mb-4">
        <h3 className="font-bold text-amber-900 mb-3">👥 สมาชิกในบ้าน</h3>
        <div className="space-y-2">
          {M.map(m=>(
            <div key={m.id} className="flex items-center gap-3 p-3 rounded-xl" style={{background:m.bg}}>
              <div className="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm" style={{background:'rgba(255,255,255,.7)',color:m.color}}>{m.name.slice(0,2)}</div>
              <div className="flex-1"><p className="font-bold text-sm" style={{color:m.color}}>{m.name}</p><p className="text-xs opacity-60" style={{color:m.color}}>{m.isAdmin?'👑 Admin':m.isNurse?'🩻 นักรังสีเทคนิค':'👤 สมาชิก'}</p></div>
              <div className="w-3 h-3 rounded-full" style={{background:m.acc}}/>
            </div>
          ))}
        </div>
      </div>
      <div className="wood rounded-2xl p-4">
        <h3 className="font-bold text-amber-900 mb-3">🗑️ จัดการข้อมูล</h3>
        <div className="space-y-3">
          {acts.map(a=>(
            <div key={a.k} className="p-4 rounded-xl" style={{background:'#FFF5F5',border:'1px solid #FECACA'}}>
              <p className="text-sm font-bold text-red-700">{a.lb}</p>
              <p className="text-xs text-red-400 mb-3 mt-0.5">{a.desc}</p>
              {cfm[a.k]?(
                <div className="flex gap-2">
                  <button onClick={()=>{a.fn();setCfm({});}} className="flex-1 py-2.5 rounded-xl bg-red-500 text-white text-sm font-bold">ยืนยัน</button>
                  <button onClick={()=>setCfm({})} className="flex-1 py-2.5 rounded-xl border border-red-200 text-red-400 text-sm font-semibold">ยกเลิก</button>
                </div>
              ):(
                <button onClick={()=>setCfm({[a.k]:true})} className="w-full py-2.5 rounded-xl bg-red-500 text-white text-sm font-bold">{a.lb}</button>
              )}
            </div>
          ))}
        </div>
      </div>
      <div className="flex justify-center mt-8 mb-2"><CatIcon sz={48}/></div>
      <p className="text-center text-xs text-amber-300 pb-2">🐱 Home Board · Made with ❤️ for the family</p>
    </div>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────
const SHEET_URL='https://script.google.com/macros/s/AKfycbxJsrYKYf3rNcL4fFab898iNxCeDW1oryZHJxYHss2mWCUFA0GOwuD7w4FzN-BtBdw/exec';

const App=()=>{
  const [page,setPage]=useState('dashboard');
  const [user,setUser]=useState(()=>ls.get('hb_user','CHA'));
  const [sched,setSchedRaw]=useState(()=>ls.get('hb_sched',{}));
  const [shop,setShopRaw]=useState(()=>ls.get('hb_shop',[]));
  const [wakeups,setWakeupsRaw]=useState(()=>ls.get('hb_wake',[]));
  const [notes,setNotesRaw]=useState(()=>ls.get('hb_notes',[]));
  const [toasts,setToasts]=useState([]);
  const [pinModal,setPinModal]=useState(null);
  const [pinInput,setPinInput]=useState('');
  const [pinErr,setPinErr]=useState(false);

  useEffect(()=>{
    fetch(SHEET_URL)
      .then(r=>r.json())
      .then(d=>{
        if(d.sched) setSchedRaw(d.sched);
        if(d.shop)  setShopRaw(d.shop);
        if(d.wakeups) setWakeupsRaw(d.wakeups);
        if(d.notes) setNotesRaw(d.notes);
      })
      .catch(()=>{});
  },[]);

  useEffect(()=>ls.set('hb_user',user),[user]);
  useEffect(()=>ls.set('hb_sched',sched),[sched]);
  useEffect(()=>ls.set('hb_shop',shop),[shop]);
  useEffect(()=>ls.set('hb_wake',wakeups),[wakeups]);
  useEffect(()=>ls.set('hb_notes',notes),[notes]);

  const syncToSheet=useCallback(()=>{
    fetch(SHEET_URL,{method:'POST',body:JSON.stringify({sched,shop,wakeups,notes}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
  },[sched,shop,wakeups,notes]);
  useEffect(()=>{const t=setTimeout(syncToSheet,3000);return()=>clearTimeout(t);},[syncToSheet]);

  const handleSwitchUser=(mid)=>{
    if(mid===user)return;
    setPinInput('');
    setPinErr(false);
    setPinModal(mid);
  };
  const confirmPin=()=>{
    const m=gM(pinModal);
    if(pinInput===m?.pin){setUser(pinModal);setPinModal(null);}
    else{setPinErr(true);}
  };

  const pushToast=useCallback((t)=>{
    setToasts(p=>[...p,t]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==t.id)),6000);
  },[]);
  const dismissToast=useCallback(id=>setToasts(p=>p.filter(x=>x.id!==id)),[]);

  const {requestPerm,scheduleWake}=useNotifications(wakeups,shop,pushToast);
  const setSched=useCallback(u=>setSchedRaw(p=>typeof u==='function'?u(p):u),[]);
  const isAdmin=user==='CHA';

  return(
    <div style={{fontFamily:"'Sarabun',sans-serif",background:'#FAF7F2',minHeight:'100vh'}}>
      <ToastLayer toasts={toasts} dismiss={dismissToast}/>{pinModal&&(
  <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,.4)'}}>
    <div className="wood rounded-2xl p-6 mx-4 w-full max-w-xs slide-up">
      {(()=>{const m=gM(pinModal);return(<>
        <div className="text-center mb-4">
          <div className="w-14 h-14 rounded-full flex items-center justify-center font-bold text-lg mx-auto mb-2" style={{background:m?.bg,color:m?.color}}>{m?.name.slice(0,2)}</div>
          <p className="font-bold text-amber-900">ใส่ PIN ของ {m?.name}</p>
        </div>
        <input type="password" inputMode="numeric" maxLength={4} value={pinInput}
          onChange={e=>{setPinInput(e.target.value);setPinErr(false);}}
          onKeyDown={e=>e.key==='Enter'&&confirmPin()}
          className="w-full text-center text-2xl tracking-widest rounded-xl px-3 py-3 border mb-3 outline-none"
          style={{borderColor:pinErr?'#EF4444':'#E8DCC8',background:'#FAF7F2'}}
          autoFocus placeholder="••••"/>
        {pinErr&&<p className="text-red-400 text-xs text-center mb-3">PIN ไม่ถูกต้อง</p>}
        <div className="flex gap-2">
          <button onClick={()=>setPinModal(null)} className="flex-1 py-3 rounded-xl border border-amber-200 text-amber-500 font-semibold text-sm">ยกเลิก</button>
          <button onClick={confirmPin} className="flex-1 py-3 rounded-xl text-white font-bold text-sm" style={{background:'#B45309'}}>เข้าสู่ระบบ</button>
        </div>
      </>);})()} 
    </div>
  </div>
)}
      <div className="sticky top-0 z-30 flex items-center justify-between px-4 py-2 border-b border-amber-200" style={{background:'#FEFCF8'}}>
        <div className="flex items-center gap-2"><CatIcon sz={24}/><span className="text-sm font-black text-amber-800">Home Board</span></div>
        <div className="flex items-center gap-1">
          <span className="text-xs text-amber-400 mr-1">ฉัน:</span>
          {M.map(m=>(
            <button key={m.id} onClick={()=>handleSwitchUser(m.id)} className="text-xs px-2 py-1 rounded-full font-bold"
                    style={{background:user===m.id?m.acc:'#F3F4F6',color:user===m.id?'#fff':'#9CA3AF'}}>
              {m.name.split(' ')[0]}
            </button>
          ))}
        </div>
      </div>

      {page==='dashboard'&&<Dashboard sched={sched} user={user} setUser={setUser} wakeups={wakeups} setWakeups={setWakeupsRaw} shop={shop} setShop={setShopRaw} notes={notes} setNotes={setNotesRaw} isAdmin={isAdmin} requestPerm={requestPerm} scheduleWake={scheduleWake}/>}
      {page==='calendar'&&<Calendar sched={sched} setSched={setSched}/>}
      {page==='notes'&&<Notes notes={notes} setNotes={setNotesRaw} user={user}/>}
      {page==='admin'&&isAdmin&&<Admin shop={shop} setShop={setShopRaw} sched={sched} setSched={setSched} wakeups={wakeups} setWakeups={setWakeupsRaw} notes={notes} setNotes={setNotesRaw}/>}
      <Nav page={page} go={setPage} admin={isAdmin}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
